<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title> Sorteador Pokémon </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Quem é esse Pokémon?</h1>
        
        <div id="pokemon-card" class="card">
            <img id="poke-img" src="" alt="Imagem do Pokémon">
            <h2 id="poke-name">Clique para Sortear</h2>
            <p id="poke-type"></p>
        </div>

        <button onclick="sortearPokemon()">Sortear Aleatório!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
